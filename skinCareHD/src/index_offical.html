      // 先確保在 YMK 初始化後才綁定事件
      window.ymkAsyncInit = function () {
        // 啟動 SDK
        YMK.init();
        YMK.openSkincare("live");
        console.log("已啟動");
        // 綁定「分析完成」事件
        YMK.addEventListener("skinAnalysisUpdated", function (data) {
          console.log("分析完成");
          // 先把整包 data 都印出來，看一下正確的欄位長什麼樣子
          console.log("=== 完整分析結果 ===");
          console.log(data);

          // 假設文件上欄位就是這些名稱，就直接這樣取
          console.log("膚齡 (skinAge):", data.skinAge);
          console.log("膚質分數 (skinScore):", data.skinScore);
          console.log("油脂 (oiliness):", data.oiliness);
          console.log("斑點 (spots):", data.spots);
          console.log("皺紋 (wrinkles):", data.wrinkles);

          // 如果欄位在更深一層（例如 data.results.skinAge），
